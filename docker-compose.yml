version: '3.8'

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: scoutly-backend
    container_name: scoutly-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    networks:
      - scoutly-network
    depends_on:
      - postgres
      - redis

  webserver:
    image: nginx:alpine
    container_name: scoutly-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - scoutly-network

  postgres:
    image: postgres:15-alpine
    container_name: scoutly-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: scoutly
      POSTGRES_USER: scoutly_user
      POSTGRES_PASSWORD: scoutly_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - scoutly-network

  redis:
    image: redis:alpine
    container_name: scoutly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - scoutly-network

  horizon:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: scoutly-backend
    container_name: scoutly-horizon
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: php artisan horizon
    networks:
      - scoutly-network
    depends_on:
      - app

networks:
  scoutly-network:
    driver: bridge

volumes:
  pgdata:
    driver: local
